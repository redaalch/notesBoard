# Node.js
# Build a general Node.js project with npm.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  # Phase 6.2: enforce perf budgets and Lighthouse in CI.
  PERF_ENFORCE: "true"
  LIGHTHOUSE_STRICT: "true"

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: "20.x"
    displayName: "Install Node.js"

  - script: |
      npm install
      npm ci --prefix frontend
      npm run build
    displayName: "Install dependencies and build"

  - script: |
      npm run perf:baseline --prefix frontend
      npm run perf:budget:check --prefix frontend
    displayName: "Frontend perf checks (enforced)"
    env:
      PERF_ENFORCE: $(PERF_ENFORCE)
      LIGHTHOUSE_STRICT: $(LIGHTHOUSE_STRICT)

  - task: PublishBuildArtifacts@1
    displayName: "Publish frontend perf reports"
    inputs:
      PathtoPublish: "frontend/perf-reports"
      ArtifactName: "frontend-perf-reports"
    condition: always()
