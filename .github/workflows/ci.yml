name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, lint, test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Backend — typecheck
        run: npm run typecheck -w backend

      - name: Frontend — typecheck
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Frontend — lint
        run: npm run lint -w frontend

      - name: Backend — tests
        run: npm test -w backend

      - name: Frontend — tests
        run: npm test -w frontend -- --run

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit (fail on high+)
        run: npm run audit:all
