<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 840" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">NotesBoard hero banner</title>
  <desc id="desc">A stylized NotesBoard banner showing collaborative editing, offline sync, and AI-assisted notes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFF"/>
      <stop offset="1" stop-color="#EEF7F1"/>
    </linearGradient>
    <linearGradient id="card" x1="80" y1="88" x2="1520" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FBFF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <filter id="shadow" x="40" y="48" width="1520" height="744" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="840" fill="url(#bg)"/>
  <circle cx="140" cy="126" r="116" fill="#DBEAFE"/>
  <circle cx="1492" cy="184" r="160" fill="#D1FAE5"/>
  <circle cx="1440" cy="706" r="190" fill="#EDE9FE"/>

  <g filter="url(#shadow)">
    <rect x="72" y="72" width="1456" height="696" rx="40" fill="url(#card)"/>
  </g>

  <g transform="translate(132 136)">
    <rect width="90" height="90" rx="24" fill="#2563EB"/>
    <rect x="34" y="34" width="90" height="90" rx="24" fill="#10B981"/>
    <rect x="60" y="60" width="38" height="12" rx="6" fill="#F8FAFC" opacity="0.96"/>
    <rect x="60" y="80" width="54" height="12" rx="6" fill="#DBEAFE" opacity="0.95"/>

    <text x="0" y="212" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="82" font-weight="800" letter-spacing="-2">
      NotesBoard
    </text>
    <text x="0" y="272" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="500">
      Collaborative note workspaces with realtime editing,
    </text>
    <text x="0" y="312" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="500">
      offline replay, publishing, and AI-assisted capture.
    </text>

    <g transform="translate(0 372)">
      <rect width="218" height="48" rx="24" fill="#DBEAFE"/>
      <text x="24" y="31" fill="#1D4ED8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">
        Realtime collaboration
      </text>

      <rect x="232" width="154" height="48" rx="24" fill="#DCFCE7"/>
      <text x="256" y="31" fill="#047857" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">
        Offline sync
      </text>

      <rect x="400" width="160" height="48" rx="24" fill="#F3E8FF"/>
      <text x="426" y="31" fill="#7C3AED" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">
        AI summaries
      </text>
    </g>

    <g transform="translate(0 458)">
      <rect width="560" height="150" rx="28" fill="#F8FAFC" stroke="#D7E3F3"/>
      <text x="28" y="38" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">
        Built for focused knowledge work
      </text>
      <text x="28" y="74" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">
        Workspace permissions, notebook history, share links, analytics,
      </text>
      <text x="28" y="104" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">
        template import flows, and resilient mutation replay when clients
      </text>
      <text x="28" y="134" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">
        reconnect after going offline.
      </text>
    </g>
  </g>

  <g transform="translate(894 124)">
    <rect width="506" height="568" rx="34" fill="#FFFFFF" stroke="#D9E4F2"/>
    <rect x="28" y="28" width="450" height="54" rx="18" fill="#F8FAFC" stroke="#E2E8F0"/>
    <circle cx="58" cy="55" r="8" fill="#2563EB"/>
    <circle cx="84" cy="55" r="8" fill="#10B981"/>
    <circle cx="110" cy="55" r="8" fill="#A855F7"/>
    <rect x="138" y="42" width="124" height="24" rx="12" fill="#E2E8F0"/>
    <rect x="308" y="40" width="138" height="28" rx="14" fill="#DBEAFE"/>

    <rect x="28" y="104" width="286" height="188" rx="24" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="52" y="140" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
      Sprint notes
    </text>
    <rect x="52" y="160" width="122" height="22" rx="11" fill="#DCFCE7"/>
    <rect x="52" y="196" width="214" height="12" rx="6" fill="#CBD5E1"/>
    <rect x="52" y="220" width="184" height="12" rx="6" fill="#CBD5E1"/>
    <rect x="52" y="244" width="196" height="12" rx="6" fill="#CBD5E1"/>
    <rect x="52" y="268" width="142" height="12" rx="6" fill="#DBEAFE"/>
    <circle cx="256" cy="142" r="14" fill="#2563EB"/>
    <circle cx="278" cy="142" r="14" fill="#10B981"/>

    <rect x="334" y="104" width="144" height="188" rx="24" fill="#0F172A"/>
    <text x="358" y="140" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">
      Sync state
    </text>
    <rect x="358" y="162" width="88" height="24" rx="12" fill="#10B981"/>
    <text x="376" y="179" fill="#052E1B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">
      HEALTHY
    </text>
    <rect x="358" y="208" width="96" height="12" rx="6" fill="#334155"/>
    <rect x="358" y="232" width="76" height="12" rx="6" fill="#334155"/>
    <rect x="358" y="256" width="108" height="12" rx="6" fill="#334155"/>

    <rect x="28" y="316" width="450" height="224" rx="24" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="52" y="352" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
      Workspace activity
    </text>
    <g transform="translate(54 384)">
      <rect width="64" height="64" rx="16" fill="#DBEAFE"/>
      <rect x="78" width="64" height="64" rx="16" fill="#E9D5FF"/>
      <rect x="156" width="64" height="64" rx="16" fill="#DCFCE7"/>
      <rect x="234" width="64" height="64" rx="16" fill="#FDE68A"/>
      <rect x="312" width="64" height="64" rx="16" fill="#DBEAFE"/>
      <rect x="390" width="32" height="64" rx="16" fill="#E2E8F0"/>
    </g>
    <rect x="54" y="472" width="274" height="12" rx="6" fill="#CBD5E1"/>
    <rect x="54" y="496" width="188" height="12" rx="6" fill="#CBD5E1"/>
  </g>
</svg>
